<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Funcionário | Controle de Ponto</title>

    <link rel="stylesheet" href="css/cadastro_funcionario.css">
</head>

<body>

    <aside class="sidebar">
        <h2>Controle de Ponto</h2>

        <nav>
            <a href="/home.html">Início</a>
            <a href="/funcionarios.html">Funcionários</a>
            <a href="/registros.html">Registros</a>
            <a href="/cadastrar_funcionario.html" class="active">
                Cadastrar
            </a>
        </nav>

        <button id="btnSair" type="button">Sair</button>
    </aside>

    <main class="content">

        <header>
            <h1>Cadastrar funcionário</h1>

            <p>
                Preencha os dados para cadastrar um novo funcionário.
            </p>
        </header>

        <section class="form-card">

            <div id="mensagem" class="mensagem"></div>

            <form id="formFuncionario">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="cpf">CPF</label>

                        <input
                            type="text"
                            id="cpf"
                            name="cpf"
                            maxlength="14"
                            placeholder="000.000.000-00"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="matricula">Matrícula</label>

                        <input
                            type="number"
                            id="matricula"
                            name="matricula"
                            min="1"
                            placeholder="Ex.: 1001"
                            required
                        >
                    </div>

                    <div class="form-group full-width">
                        <label for="nome">Nome completo</label>

                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Digite o nome completo"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="funcionario@empresa.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>

                        <input
                            type="text"
                            id="telefone"
                            name="telefone"
                            maxlength="15"
                            placeholder="(00) 00000-0000"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="dataDeNascimento">
                            Data de nascimento
                        </label>

                        <input
                            type="date"
                            id="dataDeNascimento"
                            name="dataDeNascimento"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="hierarquia">Hierarquia</label>

                        <select
                            id="hierarquia"
                            name="hierarquia"
                            required
                        >
                            <option value="">
                                Selecione
                            </option>

                            <option value="Funcionario">
                                Funcionário
                            </option>

                            <option value="Supervisor">
                                Supervisor
                            </option>

                            <option value="Gerente">
                                Gerente
                            </option>

                            <option value="Administrador">
                                Administrador
                            </option>
                        </select>
                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="button"
                        id="btnLimpar"
                        class="btn-secondary"
                    >
                        Limpar
                    </button>

                    <button
                        type="submit"
                        id="btnCadastrar"
                        class="btn-primary"
                    >
                        Cadastrar
                    </button>

                </div>

            </form>

        </section>

    </main>

    <script src="js/cadastro_funcionario.js"></script>
</body>
</html>
